name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Layer guard
        run: bash scripts/check-layers.sh

      - name: Quality gate
        run: bash scripts/check-quality.sh

      - name: Quality report freshness
        run: |
          bash scripts/update-quality.sh
          if ! git diff --quiet docs/QUALITY.md; then
            echo "FAIL: docs/QUALITY.md is stale. Run 'npm run quality' and commit."
            git diff docs/QUALITY.md
            exit 1
          fi

      - name: Unit tests
        run: npm test -- --reporter=verbose
        env:
          GEMINI_API_KEY: test-placeholder

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          GEMINI_API_KEY: test-placeholder
